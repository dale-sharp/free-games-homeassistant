name: Release

on:
  release:
    types:
      - published

permissions: {}

jobs:
  release:
    name: Package and attach release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify version matches tag
        # Ensures the version in manifest.json matches the Git tag (e.g. v1.2.3 -> 1.2.3)
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/free_games/manifest.json'))['version'])")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag '$TAG' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "Version check passed: $VERSION"

      - name: Create release zip
        # HACS installs from a zip of the integration files at the root
        run: |
          cd custom_components/free_games
          zip -r ../../free_games.zip .
          cd ../..
          echo "Created free_games.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: free_games.zip
