version: 2
updates:
  - package-ecosystem: "uv" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    target-branch: "main"
    commit-message:
      prefix: "chore"
      include: "scope"
    assignees:
      - dale-sharp
    groups:
      # homeassistant, pytest-homeassistant-custom-component, aiohttp,
      # pytest-asyncio, and pytest are structurally coupled:
      # pytest-homeassistant-custom-component pins exact homeassistant,
      # aiohttp, pytest-asyncio, and pytest versions. Bumping any one of them
      # alone produces an unsatisfiable `uv lock` (see #58); bundle them so
      # Dependabot proposes one resolvable update instead of several that
      # each fail independently.
      #
      # josepy is coupled the same way, but transitively and as a range, not
      # a direct exact pin: homeassistant -> hass-nabucasa -> acme requires
      # josepy>=1.13.0,<2, so bumping josepy alone past 2.0.0 is unsatisfiable
      # for as long as homeassistant is pinned below the release that relaxes
      # that chain (see #55).
      #
      # pyjwt is a direct exact pin of homeassistant itself (same as aiohttp),
      # not just pytest-homeassistant-custom-component's — a Dependabot
      # security-update run tried to bump it in isolation and failed to
      # resolve for exactly this reason.
      #
      # homeassistant pins dozens of dependencies exactly; not all of them are
      # listed here preemptively, only ones Dependabot has actually attempted
      # to bump in isolation and failed on. Add the next one here when it
      # happens rather than trying to enumerate the whole set up front.
      home-assistant-test-harness:
        patterns:
          - "homeassistant"
          - "pytest-homeassistant-custom-component"
          - "aiohttp"
          - "pytest-asyncio"
          - "pytest"
          - "josepy"
          - "pyjwt"

  # Check for updates to GitHub Actions every week
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 3
    assignees:
      - dale-sharp